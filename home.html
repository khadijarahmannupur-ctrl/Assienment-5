<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind and daisyUI link -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

      <style>
        *{
            font-family: "Geist", sans-serif;
        }
      </style>

      <!-- font awesome link -->
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-base-200">
    <!-- navbar -->
    <header class="sticky top-0 z-10">
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
               <div class="flex gap-1 items-center">
                 <img src="./assets/github-logo2.png" alt="">
                 <h2 class="text-2xl font-bold text-[#1F2937] hidden sm:block">GitHub Issues Tracker</h2>
               </div>
            </div>

            <!-- search input here -->
            <div class="flex gap-2">
                <label class="input">
             <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <g
                   stroke-linejoin="round"
                   stroke-linecap="round"
                   stroke-width="2.5"
                   fill="none"
                   stroke="currentColor"
               >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input id="searchInput" type="search" required placeholder="Search issues..." />
            </label>

                <button id="searchBtn" class="btn btn-primary">Search</button>
            </div>
        </div>
    </header>
    
    <!-- button tab section -->
    <section class="bg-base-100 w-full md:w-11/12 mx-auto rounded-xl mt-[60px]">
      <div id="tabButtons" class="p-6">
        <button onclick="filterByStatus('all')" id="all" class="btn btn-primary px-10 border border-[#a8b8ce8f]">All</button>
        <button onclick="filterByStatus('open')" id="open" class="btn px-10 border border-[#a8b8ce8f]">Open</button>
        <button onclick="filterByStatus('closed')" id="closed" class="btn px-10 border border-[#a8b8ce8f]">Closed</button>
        </div>
      </section>

      <!-- card counter section -->
     <section class="bg-base-100 w-full md:w-11/12 mx-auto rounded-xl mt-[60px] p-6 flex justify-between items-center">
         <div class="div-right flex items-center gap-2">
           <div class="bg-[#ECE4FF] p-2 rounded-full">
            <img src="./assets/Aperture.png" alt="">
           </div>
           <div>
            <h3 class="text-xl text-[#1F2937] font-semibold"><span id="issuesCount">0</span> Issues</h3>
            <p class="text-sm text-[#64748B]">Track and manage your project issues</p>
           </div>
         </div>
         <div class="div-left flex gap-3">
             <p class="text-sm font-medium text-[#1F2937]"><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</p>
             <p class="text-sm font-medium text-[#1F2937]"><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</p>
         </div>
     </section>
      
      <!-- all card container -->
      <section class="bg-base-300 w-full md:w-11/12 mx-auto rounded-xl mt-[60px]">
        <!-- all card append here -->
        <div id="allCardContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 p-6 gap-3">
          <!-- <div class="card bg-base-100 shadow-2xl">
            <div class="card-body">
              <div class="flex justify-end">
                <div class="badge badge-soft badge-error">High</div>
              </div>
              <h2 class="card-title text-[#1F2937]">Fix navigation menu on mobile devices</h2>
              <p class="text-[#64748B] line-clamp-2">The navigation menu doesn't collapse properly on mobile devices...</p>
              <div class="flex gap-1 border-b border-[#b4c5dd9d] space-y-5">
                <div class="badge badge-soft badge-error"><i class="fa-solid fa-bug"></i> BUG</div>
                <div class="badge badge-soft badge-warning"><i class="fa-regular fa-life-ring"></i> HELP WANTED</div>
              </div>
              <p class="text-sm text-[#64748B] mt-2">#1 by john_doe</p>
              <p class="text-sm text-[#64748B]">1/15/2024</p>
            </div>
        </div> -->

      </div>
      
      <!-- loading spinner -->
      <div id="loadingSpinner" class="h-[60vh] flex justify-center items-center">
        <span class="loading loading-dots loading-xl"></span>
      </div>
    </section>

    <!-- modal section -->
     <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="cardDetailsModal.showModal()">open modal</button> -->
        <section>
          <dialog id="cardDetailsModal" class="modal modal-bottom sm:modal-middle">
          <div class="modal-box">

          <!-- modal details will add here dynamically -->
           <div id="modalContent">

           </div>
            
          <!-- modal action -->
            <div class="modal-action">
              <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn btn-primary">Close</button>
              </form>
            </div>
          </div>
        </dialog>
        </section>

    
    

      <script src="./script/script.js"></script>
</body>
</html>
