<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind and daisyUI link -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

      <style>
        *{
            font-family: "Geist", sans-serif;
        }
      </style>

      <!-- font awesome link -->
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-base-200">
    <!-- navbar -->
    <header class="">
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
               <div class="flex gap-1 items-center">
                 <img src="./assets/github-logo2.png" alt="">
                 <h2 class="text-2xl font-bold text-[#1F2937] hidden sm:block">GitHub Issues Tracker</h2>
               </div>
            </div>
            <div class="flex gap-2">
                <label class="input">
             <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <g
                   stroke-linejoin="round"
                   stroke-linecap="round"
                   stroke-width="2.5"
                   fill="none"
                   stroke="currentColor"
               >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search issues..." />
            </label>

                    <button class="btn btn-primary">Search</button>
                </div>
        </div>
    </header>

    <!-- button tab section -->
     <section>
        <button class="btn btn-primary px-10">All</button>
        <button class="btn px-10 border border-[#64748B]">Open</button>
        <button class="btn px-10">Closed</button>
     </section>
    
</body>
</html>
